# misc config
set -s default-terminal "tmux-256color"
set -s set-clipboard on
set -g prefix C-a

source-file ~/dotfiles/terminal/themes/nightfox/extra/carbonfox/carbonfox.tmux

set -g status-right ""
set -g status-left "#[fg=#78a9ff,bold] #S #[fg=#525252,nobold]| "

# window list styling
setw -g window-status-format "#[fg=#525252] #I  #W|"
setw -g window-status-current-format "#[fg=#78a9ff,bold] #I  #W #[fg=#525252,nobold]| "
setw -g window-status-separator ""

# matching pane borders
set -g pane-border-status top
set -g pane-border-format ' #{pane_index}: #{pane_current_command} '

# shortcuts
bind s setw synchronize-panes

# vim keybindings
## 'vi mode' just means hjkl movement, this takes care of copy paste
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
set-window-option -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# other bindings
bind a send-prefix
bind C-a send-prefix
bind x command-prompt -p "Kill pane? (yes/n):" "if-shell '[ \"%%\" = \"yes\" ]' kill-pane"

