# misc config
set -s default-terminal "tmux-256color"
set -s set-clipboard on
set -g prefix C-a

# shortcuts
bind s setw synchronize-panes

# vim keybindings
## 'vi mode' just means hjkl movement, this takes care of copy paste
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
set-window-option -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# other bindings
bind a send-prefix
bind C-a send-prefix
bind x command-prompt -p "Kill pane? (yes/n):" "if-shell '[ \"%%\" = \"yes\" ]' kill-pane"

# status bar
set -g status-style bg="#161616",fg="#ffffff"

# left side prefix
set -g status-left-length 20
set -g status-left "#[fg=#161616,bg=#be95ff]#{?client_prefix,⌨,  }#[default]#[fg=#161616,bg=#be95ff] #S #[default] "

# window list styling
setw -g window-status-format "#[fg=#525252] #I #W "
setw -g window-status-current-format "#[fg=#161616,bg=#33b1ff] #I #W #[default]"

# matching pane borders
set -g pane-border-status top
set -g pane-border-format ' #{pane_index}: #{pane_current_command} '
set -g pane-border-style fg='#525252'
set -g pane-active-border-style fg='#be95ff'

# clear right side
set -g status-right ""
